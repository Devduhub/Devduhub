<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="100%" style="stop-color:#1a0030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="495" height="195" rx="12" fill="url(#bg)" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="25" y="35" font-family="'Courier New', monospace" font-size="14" font-weight="bold"
        fill="#06ffa5" filter="url(#glow)">📊 Devduhub's GitHub Stats</text>

  <!-- Divider -->
  <line x1="25" y1="45" x2="470" y2="45" stroke="#6d28d9" stroke-width="0.8" opacity="0.6"/>

  <!-- Star icon -->
  <text x="25" y="75" font-size="13" fill="#ec4899">⭐</text>
  <text x="45" y="75" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa">Total Stars Earned:</text>
  <text x="310" y="75" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Commits -->
  <text x="25" y="100" font-size="13" fill="#a855f7">🔄</text>
  <text x="45" y="100" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa">Total Commits (2026):</text>
  <text x="310" y="100" font-family="'Courier New', monospace" font-size="13" fill="#06ffa5" font-weight="bold" filter="url(#glow)">9</text>

  <!-- PRs -->
  <text x="25" y="125" font-size="13" fill="#06ffa5">🔀</text>
  <text x="45" y="125" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa">Total PRs:</text>
  <text x="310" y="125" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Issues -->
  <text x="25" y="150" font-size="13" fill="#ec4899">❗</text>
  <text x="45" y="150" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa">Total Issues:</text>
  <text x="310" y="150" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Contributed to -->
  <text x="25" y="175" font-size="13" fill="#a855f7">📦</text>
  <text x="45" y="175" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa">Contributed to:</text>
  <text x="310" y="175" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" font-weight="bold">1 repo</text>

  <!-- Grade circle -->
  <circle cx="430" cy="105" r="40" fill="none" stroke="#1a0030" stroke-width="8"/>
  <circle cx="430" cy="105" r="40" fill="none" stroke="#ec4899" stroke-width="8"
          stroke-dasharray="180 251" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 430 105)" filter="url(#glow)"/>
  <text x="430" y="100" font-family="'Courier New', monospace" font-size="18" font-weight="bold"
        fill="#ffffff" text-anchor="middle">A+</text>
  <text x="430" y="118" font-family="'Courier New', monospace" font-size="10"
        fill="#06ffa5" text-anchor="middle">RANK</text>
</svg>
